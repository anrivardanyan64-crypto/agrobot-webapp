<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: var(--tg-theme-bg-color, #f5f7fa);
            padding: 16px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 24px;
            padding: 20px;
            background: var(--tg-theme-secondary-bg-color, white);
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            font-size: 24px;
            color: var(--tg-theme-text-color, #1a2b3c);
            margin-bottom: 8px;
        }
        
        .header p {
            color: var(--tg-theme-hint-color, #666);
            font-size: 14px;
        }
        
        .date-info {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 8px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 14px;
        }
        
        .section {
            background: var(--tg-theme-secondary-bg-color, white);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .section h2 {
            font-size: 18px;
            color: var(--tg-theme-text-color, #1a2b3c);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--tg-theme-text-color, #333);
            font-weight: 500;
            font-size: 14px;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            background: var(--tg-theme-bg-color, #f9f9f9);
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }
        
        .input-group .unit {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .submit-btn {
            flex: 1;
            background: #4CAF50;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        
        .submit-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .cancel-btn {
            flex: 1;
            background: #f44336;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .cancel-btn:hover {
            background: #da190b;
        }
        
        .success-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #4CAF50;
            color: white;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            animation: fadeIn 0.3s;
            z-index: 1000;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -60%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
        
        @media (max-width: 480px) {
            .row {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌱 Ежедневный мониторинг теплицы</h1>
            <p>Заполните показатели за вчерашний день</p>
            <div class="date-info" id="dateInfo">📅 Дата: Загрузка...</div>
        </div>

        <form id="monitoringForm">
            <!-- Ночной климат -->
            <div class="section">
                <h2>🌡️ Климат ночью</h2>
                <div class="row">
                    <div class="input-group">
                        <label>Температура (°C)</label>
                        <input type="number" id="night_temp" step="0.1" placeholder="18.5" required>
                        <div class="unit">°C</div>
                    </div>
                    <div class="input-group">
                        <label>Влажность (%)</label>
                        <input type="number" id="night_humidity" min="0" max="100" placeholder="75" required>
                        <div class="unit">%</div>
                    </div>
                </div>
            </div>

            <!-- Параметры раствора -->
            <div class="section">
                <h2>💧 Питательный раствор</h2>
                <div class="row">
                    <div class="input-group">
                        <label>EC (mS/cm)</label>
                        <input type="number" id="ec" step="0.1" placeholder="2.5" required>
                        <div class="unit">mS/cm</div>
                    </div>
                    <div class="input-group">
                        <label>pH</label>
                        <input type="number" id="ph" step="0.1" min="0" max="14" placeholder="6.2" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Дренаж (%)</label>
                    <input type="number" id="drainage" min="0" max="100" placeholder="30" required>
                    <div class="unit">% от полива</div>
                </div>
            </div>

            <!-- Дополнительные параметры -->
            <div class="section">
                <h2>📊 Дополнительно</h2>
                <div class="input-group">
                    <label>Заметки</label>
                    <input type="text" id="notes" placeholder="Особые наблюдения...">
                </div>
            </div>

            <div class="button-group">
                <button type="button" class="submit-btn" onclick="sendReport()">📤 Отправить отчет</button>
                <button type="button" class="cancel-btn" onclick="closeApp()">❌ Закрыть</button>
            </div>
        </form>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Данные пользователя
        const user = tg.initDataUnsafe?.user;
        
        // Устанавливаем сегодняшнюю дату
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        
        document.getElementById('dateInfo').innerHTML = 
            `📅 Отчет за: ${yesterday.toLocaleDateString('ru-RU')}`;
        
        // Функция отправки отчета
        function sendReport() {
            // Собираем данные
            const reportData = {
                user_id: user?.id,
                user_name: user?.first_name || 'Unknown',
                date: yesterday.toISOString().split('T')[0],
                timestamp: new Date().toISOString(),
                
                // Климат ночью
                night_temp: parseFloat(document.getElementById('night_temp').value) || 0,
                night_humidity: parseInt(document.getElementById('night_humidity').value) || 0,
                
                // Параметры раствора
                ec: parseFloat(document.getElementById('ec').value) || 0,
                ph: parseFloat(document.getElementById('ph').value) || 0,
                drainage: parseInt(document.getElementById('drainage').value) || 0,
                
                // Дополнительно
                notes: document.getElementById('notes').value || '',
                
                // Метаданные
                source: 'web_app',
                version: '1.0'
            };
            
            // Проверка обязательных полей
            if (!reportData.night_temp || !reportData.night_humidity || !reportData.ec || !reportData.ph || !reportData.drainage) {
                tg.showAlert('❌ Заполните все обязательные поля!');
                return;
            }
            
            // Показываем сообщение об отправке
            const successDiv = document.createElement('div');
            successDiv.className = 'success-message';
            successDiv.textContent = '✅ Отправка...';
            document.body.appendChild(successDiv);
            
            // Отправляем данные
            tg.sendData(JSON.stringify(reportData));
            
            // Обновляем сообщение
            successDiv.textContent = '✅ Отчет отправлен!';
            
            // Закрываем через 2 секунды
            setTimeout(() => {
                tg.close();
            }, 2000);
        }
        
        // Функция закрытия
        function closeApp() {
            tg.close();
        }
        
        // Настройка Main Button как запасной вариант
        tg.MainButton.setText("ОТПРАВИТЬ ОТЧЕТ");
        tg.MainButton.onClick(sendReport);
        tg.MainButton.show();
        
        // Показываем информацию о пользователе
        console.log('Web App загружен для пользователя:', user?.id);
    </script>
</body>
</html>
